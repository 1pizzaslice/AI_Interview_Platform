name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Type-check, Test, Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run
        env:
          MONGODB_URI: mongodb://localhost:27017/ai-interview-test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-minimum-16-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-16
          LLM_PROVIDER: mock
          STT_PROVIDER: mock
          TTS_PROVIDER: mock
          NODE_ENV: test

      - name: Build
        run: npx tsc

  frontend:
    name: Frontend — Lint, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
